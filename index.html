<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fef6f9" />
  <title>Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-container">
    <header class="game-header">
      <h1>Snake</h1>
      <div class="scores">
        <div class="score-box">
          <span class="score-label">ניקוד</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">שיא</span>
          <span class="score-value" id="high-score">0</span>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <label class="difficulty">
        רמת קושי
        <select id="difficulty">
          <option value="easy">קל</option>
          <option value="normal" selected>רגיל</option>
          <option value="hard">קשה</option>
        </select>
      </label>
      <button id="start-btn" class="primary-btn" type="button">התחל</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="400" height="400" aria-label="לוח משחק הנחש"></canvas>
      <div id="overlay" class="overlay hidden" role="dialog" aria-live="polite">
        <div class="overlay-card">
          <h2 id="overlay-title">המשחק נגמר</h2>
          <p>הניקוד הסופי: <span id="final-score">0</span></p>
          <button id="restart-btn" class="primary-btn" type="button">שחק שוב</button>
        </div>
      </div>
    </div>

    <div class="dpad" aria-label="פקדי נחש למובייל">
      <button class="dpad-btn up" data-dir="up" type="button" aria-label="למעלה">▲</button>
      <div class="dpad-row">
        <button class="dpad-btn left" data-dir="left" type="button" aria-label="שמאלה">◀</button>
        <button class="dpad-btn right" data-dir="right" type="button" aria-label="ימינה">▶</button>
      </div>
      <button class="dpad-btn down" data-dir="down" type="button" aria-label="למטה">▼</button>
    </div>

    <p class="hint">מקלדת: חצים או WASD · מובייל: swipe או כפתורים</p>
  </main>

  <script src="game.js"></script>
</body>
</html>
