<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <h1>Snake Game</h1>
    <div class="score-board">
      <div>ניקוד: <span id="score">0</span></div>
      <div>שיא: <span id="high-score">0</span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">
      <button id="start-btn">התחל משחק</button>
      <p class="hint">השתמש בחיצי המקלדת כדי לשלוט בנחש</p>
    </div>
    <div id="game-over" class="hidden">
      <h2>המשחק נגמר!</h2>
      <p>הניקוד הסופי: <span id="final-score">0</span></p>
      <button id="restart-btn">שחק שוב</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
